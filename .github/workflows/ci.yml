name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate DSL fixtures
        run: npm run dsl:validate

      - name: Smoke test live flow
        run: npm run live:smoke
